<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Glass Countdown</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <video
      class="video-background"
      id="video-background"
      loop
      muted
      autoplay
      playsinline
    >
      <source src="time.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>

    <div class="container" id="main-container">
      <div class="input-container" id="input-container">
        <h1>Create Countdown</h1>
        <form id="countdownForm">
          <input type="text" id="title" placeholder="Event Title..." required />
          <input
            type="text"
            id="date-picker"
            placeholder="Select Date & Time"
            required
          />
          <button type="submit" class="btn-primary">START</button>
        </form>
      </div>

      <div class="countdown" id="countdown" hidden>
        <h1 id="countdown-title"></h1>
        <div class="timer-display">
          <div class="time-part">
            <span id="days"></span>
            <p>Days</p>
          </div>
          <div class="time-part">
            <span id="hours"></span>
            <p>Hours</p>
          </div>
          <div class="time-part">
            <span id="minutes"></span>
            <p>Mins</p>
          </div>
          <div class="time-part">
            <span id="seconds"></span>
            <p>Secs</p>
          </div>
        </div>
        <button id="countdown-button">RESET</button>
      </div>

      <div class="complete" id="complete" hidden>
        <h1 class="complete-title">Finished!</h1>
        <button id="complete-button">NEW</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
  </body>
</html>
